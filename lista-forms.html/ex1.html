<!DOCTYPE html>
<html lang="pt-br">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>Formulário 1</title>
   <link rel="stylesheet" href="style2.css">
</head>
<body>
   <table width="30%" height="1000px">
      <tr>
         <td colspan="3">
            <h2>Formulário de Adesão</h2>
         </td>
      </tr>
      <tr>
         <td colspan="3">
            <p>Nós oferecemos uma opção de filiação sob medida para atender às suas necessidades específicas.</p>
         </td>
      </tr>
      <tr>
         <td colspan="3">
            <hr>
         </td>
      </tr>
      <form>
         <tr>
            <td>
               <label for="name">Nome</label>
            </td>
            <td>
               <input type="text" placeholder="First">
            </td>
            <td colspan="2">
               <input type="text" placeholder="Last">
            </td>
         </tr>
         <tr>
            <td>
               E-mail
            </td>
            <td colspan="2"> 
               <input type="email">
            </td>
         </tr>
         <tr>
            <td>
               <label for="tel">Telefone</label>
            </td>
            <td colspan="2">
               <input type="number">
            </td>
         </tr>
         <tr>
            <td>
               <label for="end">Endereço</label>
            </td>
            <td colspan="2">
               <input type="text" placeholder="Street Address">
            </td>
         </tr>
         <tr>
            <td>

            </td>
            <td>
               <input type="text" placeholder="City">
            </td>
            <td>
               <input type="text" placeholder="State">
            </td>
         </tr>
         <tr>
            <td>

            </td>
            <td>
               <input type="number" placeholder="Postal/Zip Code">
            </td>
            <td>
               <select name="Country" id="country" size="1">
                  <option disabled selected>Country</option>
                  <option value="Brasil">Brasil</option>
                  <option value="EUA">EUA</option>
                  <option value="México">México</option>
               </select>
            </td>
         </tr>
         <tr>
            <td>
               <label for="planos">Planos de Adesão</label>
            </td>
            <td colspan="2">
               <input type="radio">Padrão

               <input type="radio">Prata

               <input type="radio">Ouro
            </td>
         </tr>
         <tr>
            <td>
               <label for="sabendo">Como você ficou sabendo de nós?
               </label>
            </td>
            <td colspan="2">
               <input type="checkbox">Um amigo
            </td>
            <tr>
               <td>

               </td>
               <td colspan="2">
                  <input type="checkbox">Facebook
               </td>
            </tr>
            <tr>
               <td>

               </td>
               <td colspan="2">
                  <input type="checkbox">Twitter
               </td>
            </tr>
            <tr>
               <td>

               </td>
               <td colspan="2">
                  <input type="checkbox">Jornais
               </td>
            </tr>
            <tr>
               <td>

               </td>
               <td colspan="2">
                  <input type="checkbox">Páginas amarelas
               </td>
            </tr>
            <tr>
               <td>

               </td>
               <td colspan="2">
                  <input type="checkbox">other:
               </td>
            </tr>
            <tr>
               <td>
                  <label for="coments">Comentários
                     <br>
                     <label for="deixe" class="coment">Deixe-nos saber se há algo mais que você deseja adicionar ao nosso Formulário de Adesão</label>
                  </label>
               </td>
               <td colspan="2">
                  <textarea name="coments" id="coments"></textarea>
               </td>
            </tr>
            <tr>
               <td>
                  <label for="termos">Termos de Serviço</label>
               </td>
               <td colspan="2">
                  <input type="checkbox">Eu concordo com os <span class="destaque">termos de serviço.</span>
               </td>
            </tr>
            <tr>
               <td>
                  <label for="assinatura">Assinatura Digital</label>
               </td>
            </tr>
            <tr>
               <td colspan="3">
                  <label for="legenda" class="coment">Ao enviar esse Formulário de Adesão Online, eu certifico que as informações acima estão corretas e completas e concordo em respeitar o T.S.</label>
               </td>
            </tr>
            <tr>
               <td colspan="3">
                  <textarea name="assinatura" id="assinatura" class="textarea2"></textarea>
               </td>
            </tr>
            <tr>
               <td colspan="3" class="botao">
                  <button class="estilo-botao">Enviar Formulário de Adesão</button>
               </td>
            </tr>
         </tr>
      </form>
   </table>
</body>
</html>
